# Foundry Configuration for NeoFlowToken
# Para usar: forge verify-contract

[profile.default]
src = "contracts"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200
evm_version = "paris"
via_ir = false

[etherscan]
polygon = { key = "${OKLINK_API_KEY}", url = "https://www.oklink.com/api/v5/explorer/contract/verify-source-code-plugin/POLYGON" }

